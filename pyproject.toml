[tool.ruff]
target-version = "py311"
line-length = 110
extend-exclude = ["agent-logs", "src/ui"]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: bugbear
select = ["E", "W", "F", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI uses Depends()/Header() as defaults by design

[tool.ruff.lint.isort]
known-first-party = ["db", "ingest", "paths", "models"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
